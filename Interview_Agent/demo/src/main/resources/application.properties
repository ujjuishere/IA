spring.application.name=demo
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

proctoring.base-url=${PROCTORING_BASE_URL:http://127.0.0.1:8001}
proctoring.analyze-path=/analyze
proctoring.enabled=${PROCTORING_ENABLED:true}
proctoring.connect-timeout-ms=${PROCTORING_CONNECT_TIMEOUT_MS:3000}
proctoring.read-timeout-ms=${PROCTORING_READ_TIMEOUT_MS:8000}
proctoring.max-attempts=${PROCTORING_MAX_ATTEMPTS:3}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:3000}

llm.provider=${LLM_PROVIDER:ollama}
llm.api-key=${LLM_API_KEY:}
llm.ollama.url=${LLM_OLLAMA_URL:http://localhost:11434/api/generate}
llm.ollama.model=${LLM_OLLAMA_MODEL:llama3}
llm.openai.url=${LLM_OPENAI_URL:https://api.openai.com/v1/chat/completions}
llm.openai.model=${LLM_OPENAI_MODEL:gpt-4o-mini}
llm.grok.url=${LLM_GROK_URL:https://api.x.ai/v1/chat/completions}
llm.grok.model=${LLM_GROK_MODEL:grok-2-latest}
llm.gemini.url=${LLM_GEMINI_URL:https://generativelanguage.googleapis.com/v1beta/openai/chat/completions}
llm.gemini.model=${LLM_GEMINI_MODEL:gemini-2.0-flash}

spring.datasource.url=jdbc:h2:file:./data/interviewdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}